<!-- Ultimate Game Stash file--> 
<html>
<head>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100vw; height: 100vh; overflow: hidden; background: #000; }
</style>
</head>
<body>
<div id="wrapper" style="position:fixed;top:0;left:0;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;">
    <div id="gameContainer"></div>
</div>
<script src="https://cdn.jsdelivr.net/gh/Vrkids2009/snowrider3d@6b7c2b9167b592528b221428414e63f06c4640b9/TemplateData/UnityProgress.js"></script>
<script src="https://cdn.jsdelivr.net/gh/Vrkids2009/snowrider3d@6b7c2b9167b592528b221428414e63f06c4640b9/Build/UnityLoader.js"></script>
<script>
    var gameInstance = UnityLoader.instantiate("gameContainer", "https://cdn.jsdelivr.net/gh/Vrkids2009/snowrider3d@6b7c2b9167b592528b221428414e63f06c4640b9/Build/SnowRider3D-gd-1.json", {
        onProgress: UnityProgress,
        Module: { onRuntimeInitialized: function() { UnityProgress(gameInstance, "complete"); } }
    });

    var scaled = false;
    function applyScale() {
        var canvas = document.querySelector('#gameContainer canvas');
        if (!canvas) return;
        // Read the actual pixel dimensions Unity assigned
        var gameW = parseInt(canvas.getAttribute('width')) || canvas.offsetWidth || 960;
        var gameH = parseInt(canvas.getAttribute('height')) || canvas.offsetHeight || 600;
        if (!gameW || !gameH) return;

        var scale = Math.min(window.innerWidth / gameW, window.innerHeight / gameH);

        // Force canvas to its natural size then scale the container
        canvas.style.setProperty('width', gameW + 'px', 'important');
        canvas.style.setProperty('height', gameH + 'px', 'important');

        var container = document.getElementById('gameContainer');
        container.style.setProperty('width', gameW + 'px', 'important');
        container.style.setProperty('height', gameH + 'px', 'important');
        container.style.setProperty('transform', 'scale(' + scale + ')', 'important');
        container.style.setProperty('transform-origin', 'center center', 'important');

        scaled = true;
    }

    window.addEventListener('resize', applyScale);

    // Run on interval until scaled, then keep running in case Unity resets
    setInterval(applyScale, 500);
</script>
<script>document.addEventListener('keydown',function(e){try{window.parent.postMessage({type:'keydown',key:e.key,ctrlKey:e.ctrlKey,shiftKey:e.shiftKey,altKey:e.altKey},'*')}catch(e){}});</script>
</body>
</html>
